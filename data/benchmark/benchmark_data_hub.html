<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Benchmark Data Hub</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --panel: #fffdf9;
      --line: #d8cfc0;
      --ink: #1e1b18;
      --muted: #6b645a;
      --accent: #a24b2a;
      --accent-soft: #f3dfd6;
      --good: #2d7a50;
      --warn: #9a6d00;
      --bad: #a23434;
      --shadow: 0 16px 38px rgba(72, 53, 30, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(162, 75, 42, 0.08), transparent 24%),
        radial-gradient(circle at top right, rgba(45, 122, 80, 0.07), transparent 18%),
        linear-gradient(180deg, #fbf8f3 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    .page {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(162, 75, 42, 0.12), rgba(255,255,255,0.96));
      border: 1px solid rgba(162, 75, 42, 0.16);
      border-radius: 22px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.1;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 920px;
      line-height: 1.6;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .stat {
      background: rgba(255,255,255,0.84);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
    }

    .stat .label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .stat .value {
      font-size: 28px;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 18px;
      margin-top: 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
    }

    .panel-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .panel-body {
      padding: 16px 18px;
    }

    .filters {
      display: grid;
      gap: 10px;
    }

    .filters label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      color: var(--ink);
      background: #fff;
    }

    .file-list {
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 320px);
      overflow: auto;
      padding-right: 4px;
      margin-top: 14px;
    }

    .file-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      cursor: pointer;
      transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease;
    }

    .file-card:hover {
      transform: translateY(-1px);
      border-color: rgba(162, 75, 42, 0.4);
      box-shadow: 0 10px 24px rgba(72, 53, 30, 0.1);
    }

    .file-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(162, 75, 42, 0.12);
    }

    .file-card h3 {
      margin: 0 0 8px;
      font-size: 15px;
      line-height: 1.4;
    }

    .file-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 600;
      background: #f2ede4;
      color: #4f4a42;
    }

    .badge.json { background: rgba(45,122,80,0.14); color: var(--good); }
    .badge.jsonl { background: rgba(154,109,0,0.16); color: var(--warn); }
    .badge.csv { background: rgba(162,75,42,0.14); color: var(--accent); }

    .content-grid {
      display: grid;
      gap: 16px;
    }

    .section {
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .section h3 {
      margin: 0 0 12px;
      font-size: 15px;
    }

    .section p, .section li {
      line-height: 1.58;
      color: #34302b;
    }

    .kv {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 10px 14px;
      font-size: 14px;
    }

    .kv .k {
      color: var(--muted);
      font-weight: 600;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }

    .toolbar .small {
      color: var(--muted);
      font-size: 13px;
    }

    .table-wrap {
      display: block;
      width: 100%;
      overflow-x: auto;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.82);
      max-width: 100%;
      scrollbar-gutter: stable both-edges;
    }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
      min-width: 160px;
    }

    .scroll-toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .scroll-toolbar button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .scroll-toolbar button:hover {
      border-color: rgba(162, 75, 42, 0.4);
      background: var(--accent-soft);
    }

    th {
      background: rgba(255,255,255,0.92);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .code-block {
      white-space: pre-wrap;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 13px;
      line-height: 1.55;
      max-height: 360px;
      overflow: auto;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.66);
    }

    .muted { color: var(--muted); }

    @media (max-width: 1180px) {
      .layout { grid-template-columns: 1fr; }
      .file-list { max-height: 360px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>Benchmark Data Hub</h1>
      <p>
        Trang này gom toàn bộ file JSON, JSONL và CSV trong thư mục benchmark vào một chỗ để mình rà soát dễ hơn.
        Bạn có thể chọn từng file, xem thống kê nhanh, preview dạng bảng, và đọc raw content ngay trên trình duyệt.
      </p>
      <div class="hero-stats" id="heroStats"></div>
    </section>

    <div class="layout">
      <aside class="panel">
        <div class="panel-header">
          <h2>Danh sách file</h2>
        </div>
        <div class="panel-body">
          <div class="filters">
            <label>
              Tìm theo tên file
              <input id="fileSearch" type="search" placeholder="benchmark_eval, draft_v2, summary...">
            </label>
            <label>
              Loại file
              <select id="typeFilter"></select>
            </label>
          </div>
          <div class="file-list" id="fileList"></div>
        </div>
      </aside>

      <main class="panel">
        <div class="panel-header">
          <h2>Chi tiết file</h2>
        </div>
        <div class="panel-body">
          <div class="content-grid" id="detailPanel"></div>
        </div>
      </main>
    </div>
  </div>

  <script>
    const files = JSON.parse(document.getElementById("hub-data").textContent);
    const state = {
      search: "",
      type: "all",
      selectedName: files.length ? files[0].name : null,
      rowSearch: "",
    };

    const elements = {
      heroStats: document.getElementById("heroStats"),
      fileSearch: document.getElementById("fileSearch"),
      typeFilter: document.getElementById("typeFilter"),
      fileList: document.getElementById("fileList"),
      detailPanel: document.getElementById("detailPanel"),
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function buildSelect(select, values, placeholder) {
      select.innerHTML = "";
      const allOption = document.createElement("option");
      allOption.value = "all";
      allOption.textContent = placeholder;
      select.appendChild(allOption);
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function uniqueValues(items, getter) {
      return [...new Set(items.map(getter).filter(Boolean))].sort();
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
    }

    function matchesFileFilters(file) {
      if (state.search && !file.name.toLowerCase().includes(state.search)) return false;
      if (state.type !== "all" && file.type !== state.type) return false;
      return true;
    }

    function renderHeroStats() {
      const counts = files.reduce((acc, file) => {
        acc[file.type] = (acc[file.type] || 0) + 1;
        return acc;
      }, {});
      const totalSize = files.reduce((sum, file) => sum + file.size_bytes, 0);
      elements.heroStats.innerHTML = `
        <div class="stat">
          <span class="label">Tổng file</span>
          <span class="value">${files.length}</span>
        </div>
        <div class="stat">
          <span class="label">JSON</span>
          <span class="value">${counts.json || 0}</span>
        </div>
        <div class="stat">
          <span class="label">JSONL</span>
          <span class="value">${counts.jsonl || 0}</span>
        </div>
        <div class="stat">
          <span class="label">CSV</span>
          <span class="value">${counts.csv || 0}</span>
        </div>
        <div class="stat">
          <span class="label">Dung lượng</span>
          <span class="value">${formatBytes(totalSize)}</span>
        </div>
      `;
    }

    function renderFileList() {
      const filtered = files.filter(matchesFileFilters);
      if (!filtered.length) {
        elements.fileList.innerHTML = `<div class="empty">Không có file nào khớp bộ lọc hiện tại.</div>`;
        elements.detailPanel.innerHTML = `<div class="empty">Chưa có file để hiển thị.</div>`;
        return;
      }

      if (!filtered.some((file) => file.name === state.selectedName)) {
        state.selectedName = filtered[0].name;
      }

      elements.fileList.innerHTML = filtered.map((file) => `
        <article class="file-card ${file.name === state.selectedName ? "active" : ""}" data-name="${file.name}">
          <h3>${escapeHtml(file.name)}</h3>
          <p>${escapeHtml(file.summary)}</p>
          <div class="badges">
            <span class="badge ${escapeHtml(file.type)}">${escapeHtml(file.type.toUpperCase())}</span>
            <span class="badge">${escapeHtml(formatBytes(file.size_bytes))}</span>
            <span class="badge">${escapeHtml(file.row_count_label)}</span>
          </div>
        </article>
      `).join("");

      for (const card of elements.fileList.querySelectorAll(".file-card")) {
        card.addEventListener("click", () => {
          state.selectedName = card.dataset.name;
          state.rowSearch = "";
          renderFileList();
          renderDetailPanel();
        });
      }

      renderDetailPanel();
    }

    function renderPreviewTable(file, rows, columns) {
      if (!rows.length || !columns.length) {
        return `<div class="empty">Không có dữ liệu dạng hàng để preview.</div>`;
      }

      const limitedRows = rows.slice(0, 50);
      const wrapId = `table-wrap-${file.name.replace(/[^a-zA-Z0-9_-]/g, "-")}`;
      return `
        <div class="scroll-toolbar">
          <button type="button" onclick="scrollPreview('${wrapId}', -420)">Cuộn trái</button>
          <button type="button" onclick="scrollPreview('${wrapId}', 420)">Cuộn phải</button>
          <span class="small">Nếu bảng rộng, bạn có thể dùng 2 nút này hoặc Shift + lăn chuột.</span>
        </div>
        <div class="table-wrap" id="${wrapId}">
          <table>
            <thead>
              <tr>${columns.map((column) => `<th>${escapeHtml(column)}</th>`).join("")}</tr>
            </thead>
            <tbody>
              ${limitedRows.map((row) => `
                <tr>
                  ${columns.map((column) => `<td>${escapeHtml(typeof row[column] === "object" ? JSON.stringify(row[column]) : row[column] ?? "")}</td>`).join("")}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function scrollPreview(id, delta) {
      const element = document.getElementById(id);
      if (!element) return;
      element.scrollBy({ left: delta, behavior: "smooth" });
    }

    function renderObjectSummary(file) {
      const entries = Object.entries(file.object_summary || {});
      if (!entries.length) {
        return `<div class="empty">Không có object summary.</div>`;
      }
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Key</th><th>Value</th></tr>
            </thead>
            <tbody>
              ${entries.map(([key, value]) => `
                <tr>
                  <td>${escapeHtml(key)}</td>
                  <td>${escapeHtml(typeof value === "object" ? JSON.stringify(value) : value)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderDetailPanel() {
      const file = files.find((item) => item.name === state.selectedName);
      if (!file) {
        elements.detailPanel.innerHTML = `<div class="empty">Không tìm thấy file đang chọn.</div>`;
        return;
      }

      const rows = file.preview_rows || [];
      const columns = file.preview_columns || [];
      const rawPreview = file.raw_preview || "";

      elements.detailPanel.innerHTML = `
        <div class="section">
          <h3>Tổng quan file</h3>
          <div class="kv">
            <div class="k">Tên file</div><div>${escapeHtml(file.name)}</div>
            <div class="k">Loại file</div><div>${escapeHtml(file.type.toUpperCase())}</div>
            <div class="k">Dung lượng</div><div>${escapeHtml(formatBytes(file.size_bytes))}</div>
            <div class="k">Số dòng / phần tử</div><div>${escapeHtml(file.row_count_label)}</div>
            <div class="k">Tóm tắt</div><div>${escapeHtml(file.summary)}</div>
          </div>
        </div>

        <div class="section">
          <h3>Thông tin cấu trúc</h3>
          <div class="kv">
            <div class="k">Preview columns</div><div>${columns.length ? columns.map((column) => `<span class="badge">${escapeHtml(column)}</span>`).join(" ") : "-"}</div>
            <div class="k">Path tương đối</div><div>${escapeHtml(file.relative_path)}</div>
          </div>
        </div>

        <div class="section">
          <h3>Preview dữ liệu</h3>
          ${file.type === "json" && file.data_shape === "object" ? renderObjectSummary(file) : renderPreviewTable(file, rows, columns)}
        </div>

        <div class="section">
          <h3>Raw preview</h3>
          <div class="code-block">${escapeHtml(rawPreview)}</div>
        </div>
      `;
    }

    buildSelect(elements.typeFilter, uniqueValues(files, (file) => file.type), "Tất cả loại file");
    elements.fileSearch.addEventListener("input", (event) => {
      state.search = event.target.value.trim().toLowerCase();
      renderFileList();
    });
    elements.typeFilter.addEventListener("change", (event) => {
      state.type = event.target.value;
      renderFileList();
    });

    renderHeroStats();
    renderFileList();
  </script>
</body>
</html>
